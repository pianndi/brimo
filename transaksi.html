<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutasi Rekening - BRI</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <button class="back-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <h1 class="header-title">Mutasi Rekening</h1>
        <button class="filter-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M7 12h10M11 18h2" stroke="white" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Saldo Card -->
    <div class="saldo-card">
      <div class="saldo-info">
        <p class="saldo-label">Saldo Akhir</p>
        <h2 class="saldo-amount">Rp 10.511.633</h2>
      </div>
      <div class="periode-info">
        <p class="periode-label">Periode: Januari - Desember 2025</p>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="summary-section">
      <div class="summary-card income">
        <div class="summary-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 5V19M12 5L6 11M12 5L18 11" stroke="#0F8537" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <div class="summary-content">
          <p class="summary-label">Total Pemasukan</p>
          <p class="summary-amount income-text">+ Rp 27.567.324</p>
        </div>
      </div>
      <div class="summary-card outcome">
        <div class="summary-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 19V5M12 19L18 13M12 19L6 13" stroke="#D32F2F" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
        <div class="summary-content">
          <p class="summary-label">Total Pengeluaran</p>
          <p class="summary-amount outcome-text">- Rp 17.055.691</p>
        </div>
      </div>
    </div>

    <!-- Tab Filter -->
    <div class="tab-filter">
      <button class="tab-btn active" data-filter="all">Semua</button>
      <button class="tab-btn" data-filter="income">Pemasukan</button>
      <button class="tab-btn" data-filter="outcome">Pengeluaran</button>
    </div>

    <!-- Transaction List -->
    <div class="transaction-list" id="transactionList">
      <!-- Transactions will be populated by JavaScript -->
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
